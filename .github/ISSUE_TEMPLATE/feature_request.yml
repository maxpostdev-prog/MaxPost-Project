name: Feature request
description: Propose a focused improvement to MaxPost.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Documentation
        - Website
        - WordPress theme
        - MaxPost Core plugin
        - Desktop application
        - API
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the user problem, not only the proposed solution.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: principles
    attributes:
      label: MaxPost principles
      options:
        - label: This keeps one tool focused on one task.
        - label: This does not add unnecessary complexity.
        - label: This respects user privacy and attention.
