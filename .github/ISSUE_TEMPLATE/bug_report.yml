name: Bug report
description: Report a reproducible problem in MaxPost documentation or code.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Provide only information needed to reproduce it.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Documentation
        - WordPress theme
        - MaxPost Core plugin
        - Desktop application
        - Website design
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open...
        2. Click...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Windows 11, WordPress 6.x, PHP 8.x, browser, app version
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove passwords, tokens and personal data before posting.
